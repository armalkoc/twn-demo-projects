apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: mongo-express-deployment
  labels:
    app: mongo-express 
spec: 
  replicas: 1
  labels:
    matchLabels:
      app: mongo-express 
  template: 
    metadata:
      labels:
        app: mongo-express 
    spec:
      containers:
      - name: mongo-express 
        image: mongo-express 
        ports:
        - containerPort: 8081
      env: 
      - name: ME_CONFIG_MONGODB_ADMINUSERNAME
        valueFrom:
          secretKeyRef:
            name: db-secret
            key: mdb-root-username
      - name: ME_CONFIG_MONGODB_ADMINPASSWORD
        valueFrom: 
          secretKeyRef:
            name: db-secret
            key: mdb-root-pass
      - name: DATABASE_URL
        valueFrom:
          configMapKeyRef:
            name: db-config 
            key: database-url
      - name: ME_CONFIG_MONGODB_URL
        value: "mongodb://${ME_CONFIG_MONGODB_ADMINUSERNAME}:${ME_CONFIG_MONGODB_ADMINPASSWORD}@${DATABASE_URL}"
--- 
apiVersion: v1 
kind: Service 
metadata: 
  name: mongo-express-service
spec:
  selector:
    app: mongo-express 
  ports:
  - protocol: tcp 
    port: 8087
    targetPort: 8081
    nodePort: 30001