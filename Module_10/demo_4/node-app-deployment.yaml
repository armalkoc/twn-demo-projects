apiVersion: apps/v1 
kind: Deployment
metadata:
  name: node-app
  labels:
    app: node-app 
spec: 
  replicas: 2 
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app 
    spec:
      imagePullSecrets:
      - name: demo-4-registry
      containers:
      - name: node-app 
        image: amalkoc/twn-demo-app:twn-exc-aws-app-1.15.0-9
        ports:
        - containerPort: 3000