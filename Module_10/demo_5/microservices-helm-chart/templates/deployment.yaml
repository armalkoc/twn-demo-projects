apiVersion: apps/v1
kind: Deployment
metadata:
  name: 
spec:
  replicas: 
  selector:
    matchLabels:
      app: 
  template:
    metadata:
      labels:
        app: 
    spec:
      containers:
      - name: 
        image: 
        ports:
        - containerPort: 
        env:
        {{-range .Values.containerEnvVars}}
          - name: {{ .key }}
            value: {{ .value | quote }}
        {{-end }}